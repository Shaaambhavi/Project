<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Lab Reports</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='Patient_lab_reports.css') }}" />
</head>
<body>
  <div class="container">
    <h1>My Lab Reports</h1>

    {% if reports %}
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Report Type</th>
          <th>Status</th>
          <th>Download</th>
        </tr>
      </thead>
      <tbody>
        {% for report in reports %}
        <tr>
          <td>{{ report.date }}</td>
          <td>{{ report.report_type }}</td>  <!-- renamed from 'type' to 'report_type' -->
          <td>{{ report.status }}</td>
          <td>
            {% if report.report_link %}
              <a href="{{ url_for('static', filename='uploads/' ~ report.report_link) }}" download>Download</a>
            {% else %}
              Not Available
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
      <p>No reports available.</p>
    {% endif %}
  </div>
</body>
</html>
